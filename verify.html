            <img src="assets/logo.png" alt="SIEC" class="nav-logo-img">

                <span class="logo-main">SIEC</span>
                <span class="logo-sub">Syaf Intensive English Course</span>
            </div>
        </a>
        <button class="nav-toggle" id="navToggle">
            <span></span><span></span><span></span>
        </button>
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Beranda</a></li>
            <li><a href="programs.html" class="nav-link"><i class="fas fa-book"></i> Program</a></li>

            <li><a href="verify.html" class="nav-link"><i class="fas fa-check-circle"></i> Verifikasi</a></li>
            <li><a href="translation-status.html" class="nav-link"><i class="fas fa-search"></i> Cek Status</a></li>
        </ul>
    </div>
</nav>

    <!-- VERIFY HERO -->
    <section class="page-hero">
        <div class="container">
            <h1><i class="fas fa-shield-alt"></i> Verifikasi Dokumen</h1>
            <p>Masukkan ID dokumen atau scan barcode untuk memverifikasi keaslian dokumen</p>
        </div>
    </section>

    <!-- VERIFY FORM -->
    <section class="verify-page">
        <div class="container">
            <div class="verify-box">
                <div class="verify-tabs">
                    <button class="verify-tab active" data-tab="translation">
                        <i class="fas fa-file-alt"></i> Terjemahan
                    </button>
                    <button class="verify-tab" data-tab="toefl">
                        <i class="fas fa-certificate"></i> TOEFL
                    </button>
                </div>

                <div class="verify-form">
                    <div class="input-group">
                        <div class="input-icon">
                            <i class="fas fa-search"></i>
                        </div>
                        <input type="text" id="verifyInput" placeholder="Masukkan ID Dokumen (contoh: SIEC-TR-2024-001)" class="verify-input">
                        <button onclick="verifyDocument()" class="btn btn-primary" id="verifyBtn">
                            <i class="fas fa-check-circle"></i> Verifikasi
                        </button>
                    </div>

                    <!-- Scanner Option -->
                    <div class="scanner-option">
                        <p>atau</p>
                        <button onclick="toggleScanner()" class="btn btn-outline" id="scanBtn">
                            <i class="fas fa-barcode"></i> Scan Barcode
                        </button>
                        <div id="scannerContainer" class="scanner-container" style="display:none;">
                            <div id="reader"></div>
                        </div>
                    </div>
                </div>

                <!-- Result -->
                <div id="verifyResult" class="verify-result" style="display:none;">
                    <!-- Diisi JavaScript -->
                </div>
            </div>
        </div>
    </section>

    <!-- FLOATING WHATSAPP -->
    <a href="https://wa.me/6282174104447?text=Halo%20SIEC,%20saya%20ingin%20memverifikasi%20dokumen" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span class="wa-tooltip">Chat Kami!</span>

    <script src="js/verify.js"></script>
</body>
