<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artikel - SIEC</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <div class="logo-text">
                    <span class="logo-main">SIEC</span>
                    <span class="logo-sub">Syaf Intensive English Course</span>
                </div>
            </a>
            <button class="nav-toggle" id="navToggle"><span></span><span></span><span></span></button>
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html" class="nav-link"><i class="fas fa-home"></i> Beranda</a></li>
                <li><a href="programs.html" class="nav-link"><i class="fas fa-book"></i> Program</a></li>
                <li><a href="index.html#articles" class="nav-link active"><i class="fas fa-newspaper"></i> Artikel</a></li>
                <li><a href="verify.html" class="nav-link"><i class="fas fa-check-circle"></i> Verifikasi</a></li>
                <li><a href="translation-status.html" class="nav-link"><i class="fas fa-search"></i> Cek Status</a></li>
            </ul>
        </div>
    </nav>

    <article class="article-detail" id="articleDetail">
        <div class="container">
            <div class="loading-spinner">
                <div class="spinner"></div>
                <p>Memuat artikel...</p>
            </div>
        </div>
    </article>

    <a href="https://wa.me/6282174104447" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
        <span class="wa-tooltip">Chat Kami!</span>
    </a>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 SIEC - Syaf Intensive English Course. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            if (!slug) {
                document.getElementById('articleDetail').innerHTML = '<div class="container"><p>Artikel tidak ditemukan.</p></div>';
                return;
            }
            const { data, error } = await supabase.from('articles').select('*').eq('slug', slug).eq('is_published', true).single();
            if (error || !data) {
                document.getElementById('articleDetail').innerHTML = '<div class="container"><p>Artikel tidak ditemukan.</p></div>';
                return;
            }
            document.title = data.title + ' - SIEC';
            document.getElementById('articleDetail').innerHTML = `
                <div class="container">
                    ${data.cover_image ? `<img src="${data.cover_image}" class="article-cover" alt="${data.title}">` : ''}
                    <div class="article-header">
                        <span class="article-category">${data.category}</span>
                        <h1>${data.title}</h1>
                        <p class="article-date"><i class="fas fa-calendar"></i> ${new Date(data.published_at || data.created_at).toLocaleDateString('id-ID', {year:'numeric',month:'long',day:'numeric'})}</p>
                    </div>
                    <div class="article-body ${data.layout_type}">
                        ${data.content}
                    </div>
                    <div class="article-footer">
                        <a href="index.html#articles" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Kembali ke Artikel</a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
